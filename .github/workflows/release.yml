name: Book Fee Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run quality gates
        run: mvn -B verify

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          cp target/fee-management-1.0.0.jar "release-assets/fee-management-${GITHUB_REF_NAME}.jar"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "release-assets/fee-management-${GITHUB_REF_NAME}.jar" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "release-assets/fee-management-${GITHUB_REF_NAME}.jar" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Book Fee Collection release ${GITHUB_REF_NAME}"
          fi
