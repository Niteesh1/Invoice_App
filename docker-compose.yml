services:
  mysql:
    image: mysql:8.4
    container_name: book-fee-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_fee_db
      MYSQL_USER: book_fee_user
      MYSQL_PASSWORD: book_fee_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3308:3306"
    volumes:
      - book_fee_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  book_fee_mysql_data:
