# Activate this profile in Railway with:
# SPRING_PROFILES_ACTIVE=railway
#
# Keep Railway secrets in Railway Variables, not in git.
# Example Railway variable values:
# SPRING_DATASOURCE_URL=jdbc:mysql://${{MySQL.MYSQLHOST}}:${{MySQL.MYSQLPORT}}/${{MySQL.MYSQLDATABASE}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# SPRING_DATASOURCE_USERNAME=${{MySQL.MYSQLUSER}}
# SPRING_DATASOURCE_PASSWORD=${{MySQL.MYSQLPASSWORD}}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

server.port=${PORT}

app.security.admin-username=${APP_ADMIN_USERNAME}
app.security.admin-password=${APP_ADMIN_PASSWORD}
app.security.cashier-username=${APP_CASHIER_USERNAME}
app.security.cashier-password=${APP_CASHIER_PASSWORD}
