spring.application.name=book-fee-collection

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/book_fee_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:book_fee_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:book_fee_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${PORT:${SERVER_PORT:8082}}

app.security.admin-username=${APP_ADMIN_USERNAME:admin}
app.security.admin-password=${APP_ADMIN_PASSWORD:admin123}
app.security.cashier-username=${APP_CASHIER_USERNAME:cashier}
app.security.cashier-password=${APP_CASHIER_PASSWORD:cashier123}
