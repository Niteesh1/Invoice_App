<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Fee Config</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow">
    <div class="page-header">
        <div>
            <h1>Book Fee Config</h1>
            <p>Set the default book fee amount for each class.</p>
        </div>
    </div>
    <div class="alert success" th:if="${message}" th:text="${message}"></div>
    <form th:action="@{/book-fee-config}" method="post" class="panel">
        <table>
            <thead>
            <tr>
                <th>Class</th>
                <th class="number">Default Book Fee (Rs.)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="config, stat : ${configs}">
                <td th:text="${config.className}">Class</td>
                <td>
                    <input class="number-input"
                           type="number"
                           min="0"
                           step="0.01"
                           th:name="${'fee_' + stat.index}"
                           th:value="${config.feeAmount}">
                </td>
            </tr>
            </tbody>
        </table>
        <div class="actions">
            <a class="button secondary" th:href="@{/dashboard}">Cancel</a>
            <button type="submit">Save Config</button>
        </div>
    </form>
</main>
</body>
</html>
