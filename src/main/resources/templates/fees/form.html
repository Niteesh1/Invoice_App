<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Book Issue</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow">
    <div class="page-header">
        <div>
            <h1>New Book Issue</h1>
            <p th:if="${preselectedStudent == null}">Record book handover even when payment is pending.</p>
            <p th:if="${preselectedStudent != null}">
                <span>Creating issue for </span>
                <strong th:text="${preselectedStudent.name}">Student</strong>
                <span class="class-chip compact" th:text="${preselectedStudent.grade}">Class</span>
            </p>
        </div>
    </div>
    <form th:action="@{/fees}" th:object="${issueForm}" method="post" class="panel form-grid">
        <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        <label>
            Class
            <select th:field="*{selectedClass}" id="classSelect" required>
                <option value="">Select class</option>
                <option th:each="className : ${classOptions}" th:value="${className}" th:text="${className}">Class</option>
            </select>
            <span class="field-error" th:errors="*{selectedClass}"></span>
        </label>
        <label>
            Search Student Name
            <input id="studentSearch" type="search" placeholder="Select class first" autocomplete="off" disabled>
        </label>
        <label class="span-2">
            Student
            <select th:field="*{studentId}" id="studentSelect" required disabled>
                <option value="">Select student</option>
                <option th:each="student : ${students}"
                        th:value="${student.id}"
                        th:attr="data-class=${student.grade},data-name=${#strings.toLowerCase(student.name)}"
                        th:text="${student.name + ' - ' + student.grade}">Student</option>
            </select>
            <span class="helper-text">Only students from the selected class will appear here.</span>
            <span class="field-error" th:errors="*{studentId}"></span>
        </label>
        <label>
            Issue Date
            <input id="issueDate" name="issueDate" th:value="${issueForm.issueDate}" type="date" required>
            <span class="helper-text">Defaults to today. Change only for backdated entries.</span>
            <span class="field-error" th:errors="*{issueDate}"></span>
        </label>
        <label>
            Book Title
            <input th:field="*{bookTitle}" list="bookTitleSuggestions" required>
            <datalist id="bookTitleSuggestions">
                <option th:each="title : ${bookTitleSuggestions}" th:value="${title}"></option>
            </datalist>
            <span class="helper-text">Use the default when handing over the full related book set.</span>
            <span class="field-error" th:errors="*{bookTitle}"></span>
        </label>
        <label>
            Quantity
            <input th:field="*{quantity}" type="number" min="1" required>
            <span class="field-error" th:errors="*{quantity}"></span>
        </label>
        <label>
            Unit Price
            <input th:field="*{unitPrice}" id="unitPrice" type="number" min="0" step="0.01" required>
            <span class="helper-text">Auto-filled from class fee config; edit if needed.</span>
            <span class="field-error" th:errors="*{unitPrice}"></span>
        </label>
        <label>
            Discount
            <input th:field="*{discount}" id="discount" type="number" min="0" step="0.01" required>
            <span class="field-error" th:errors="*{discount}"></span>
        </label>
        <section class="calculation-box span-2" aria-live="polite">
            <div><span>Subtotal</span><strong class="money" id="subtotalPreview">0.00</strong></div>
            <div><span>Discount</span><strong class="money" id="discountPreview">0.00</strong></div>
            <div><span>Total Due</span><strong class="money" id="totalDuePreview">0.00</strong></div>
        </section>
        <label class="span-2">
            Remarks
            <textarea th:field="*{remarks}" rows="3"></textarea>
            <span class="field-error" th:errors="*{remarks}"></span>
        </label>
        <div class="actions span-2">
            <a class="button secondary" th:href="@{/fees}">Cancel</a>
            <button type="submit">Save Issue</button>
        </div>
    </form>
</main>
<script th:inline="javascript">
    const classFees = /*[[${classFeeMap}]]*/ {};
    const classSelect = document.getElementById("classSelect");
    const studentSearch = document.getElementById("studentSearch");
    const studentSelect = document.getElementById("studentSelect");
    const quantityInput = document.getElementById("quantity");
    const unitPriceInput = document.getElementById("unitPrice");
    const discountInput = document.getElementById("discount");
    const subtotalPreview = document.getElementById("subtotalPreview");
    const discountPreview = document.getElementById("discountPreview");
    const totalDuePreview = document.getElementById("totalDuePreview");
    const placeholder = studentSelect.querySelector("option[value='']");
    const allStudentOptions = Array.from(studentSelect.querySelectorAll("option[data-class]"));
    const initialStudentId = studentSelect.value;

    function money(value) {
        return Number.isFinite(value) ? value.toFixed(2) : "0.00";
    }

    function numberValue(input) {
        const value = Number.parseFloat(input.value);
        return Number.isFinite(value) ? value : 0;
    }

    function renderTotals() {
        const quantity = Math.max(1, Number.parseInt(quantityInput.value || "1", 10));
        const unitPrice = numberValue(unitPriceInput);
        const discount = numberValue(discountInput);
        const subtotal = quantity * unitPrice;
        const totalDue = Math.max(0, subtotal - discount);

        subtotalPreview.textContent = money(subtotal);
        discountPreview.textContent = money(discount);
        totalDuePreview.textContent = money(totalDue);
    }

    function applyClassFeeIfAvailable() {
        if (classSelect.value && Object.prototype.hasOwnProperty.call(classFees, classSelect.value)) {
            unitPriceInput.value = money(Number.parseFloat(classFees[classSelect.value]));
        }
    }

    function renderStudents() {
        const selectedClass = classSelect.value;
        const searchTerm = studentSearch.value.trim().toLowerCase();
        const previousValue = studentSelect.value || initialStudentId;

        studentSelect.innerHTML = "";
        studentSelect.appendChild(placeholder.cloneNode(true));

        const matchingStudents = allStudentOptions.filter((option) => {
            const classMatches = option.dataset.class === selectedClass;
            const nameMatches = !searchTerm || option.dataset.name.includes(searchTerm);
            return classMatches && nameMatches;
        });

        matchingStudents.forEach((option) => studentSelect.appendChild(option.cloneNode(true)));

        studentSearch.disabled = !selectedClass;
        studentSelect.disabled = !selectedClass;
        studentSearch.placeholder = selectedClass ? "Type student name" : "Select class first";

        if (selectedClass && matchingStudents.some((option) => option.value === previousValue)) {
            studentSelect.value = previousValue;
        } else {
            studentSelect.value = "";
        }
    }

    classSelect.addEventListener("change", () => {
        studentSearch.value = "";
        studentSelect.value = "";
        applyClassFeeIfAvailable();
        renderStudents();
        renderTotals();
    });
    studentSearch.addEventListener("input", renderStudents);
    quantityInput.addEventListener("input", renderTotals);
    unitPriceInput.addEventListener("input", renderTotals);
    discountInput.addEventListener("input", renderTotals);
    renderStudents();
    if (classSelect.value && initialStudentId) {
        studentSelect.value = initialStudentId;
    }
    applyClassFeeIfAvailable();
    renderTotals();
</script>
</body>
</html>
