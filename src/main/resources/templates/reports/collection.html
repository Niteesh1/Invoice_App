<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Collection Report</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <div class="page-header">
        <div>
            <h1>Collection Report</h1>
            <p>Payments received between selected dates.</p>
        </div>
        <button class="no-print" onclick="window.print()" type="button">Print</button>
    </div>
    <form class="toolbar no-print" th:action="@{/reports/collection}" method="get">
        <input type="date" name="startDate" th:value="${startDate}">
        <input type="date" name="endDate" th:value="${endDate}">
        <button type="submit">Run Report</button>
    </form>
    <section class="panel">
        <div class="section-header">
            <h2>Total</h2>
            <strong th:text="${#numbers.formatDecimal(total, 1, 2)}">0.00</strong>
        </div>
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Receipt</th>
                <th>Student</th>
                <th>Book</th>
                <th>Mode</th>
                <th class="number">Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.paymentDate}">Date</td>
                <td th:text="${payment.receiptNumber}">Receipt</td>
                <td th:text="${payment.bookIssue.student.name}">Student</td>
                <td th:text="${payment.bookIssue.bookTitle}">Book</td>
                <td th:text="${payment.paymentMode}">Mode</td>
                <td class="number" th:text="${#numbers.formatDecimal(payment.amount, 1, 2)}">0.00</td>
            </tr>
            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="6" class="empty">No payments for this period.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
