<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${student.name}">Student</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <div class="page-header">
        <div>
            <h1 th:text="${student.name}">Student</h1>
            <p>
                <span class="class-chip" th:text="${student.grade}">Class</span>
                <span class="muted-value" th:text="${student.contactNumber ?: 'No contact'}">No contact</span>
            </p>
        </div>
        <div class="actions">
            <a class="button secondary" th:href="@{/students/{id}/edit(id=${student.id})}">Edit Student</a>
            <a class="button" th:href="@{/fees/new(studentId=${student.id})}">New Book Issue</a>
            <form sec:authorize="hasRole('ADMIN')"
                  th:action="@{/students/{id}/delete(id=${student.id})}"
                  method="post"
                  th:attr="data-student-name=${student.name}"
                  onsubmit="return confirmEntireStudentDeletion(this);">
                <button class="button danger" type="submit">Delete Entire Record</button>
            </form>
        </div>
    </div>

    <section class="panel">
        <div class="section-header"><h2>Ledger</h2></div>
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Book</th>
                <th class="number">Due</th>
                <th class="number">Collected</th>
                <th class="number">Balance</th>
                <th>Status</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="issue : ${issues}">
                <td><span class="date-pill" th:text="${issue.issueDate}">Date</span></td>
                <td><span class="book-title" th:text="${issue.bookTitle}">Book</span></td>
                <td class="number money amount-due" th:text="${#numbers.formatDecimal(issue.totalDue, 1, 2)}">0.00</td>
                <td class="number money amount-collected" th:text="${#numbers.formatDecimal(issue.collectedAmount, 1, 2)}">0.00</td>
                <td class="number money amount-balance" th:text="${#numbers.formatDecimal(issue.balance, 1, 2)}">0.00</td>
                <td><span th:class="'badge status-' + ${issue.status}" th:text="${issue.status}">PENDING</span></td>
                <td><a class="row-action" th:href="@{/fees/{id}(id=${issue.id})}">Open</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(issues)}">
                <td colspan="7" class="empty">No book issues for this student yet.</td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="panel">
        <div class="section-header"><h2>Payment History</h2></div>
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Receipt</th>
                <th>Book</th>
                <th>Mode</th>
                <th class="number">Amount</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="payment : ${payments}">
                <td><span class="date-pill" th:text="${payment.paymentDate}">Date</span></td>
                <td><span class="receipt-chip" th:text="${payment.receiptNumber}">Receipt</span></td>
                <td><span class="book-title" th:text="${payment.bookIssue.bookTitle}">Book</span></td>
                <td><span class="mode-chip" th:text="${payment.paymentMode}">CASH</span></td>
                <td class="number money amount-collected" th:text="${#numbers.formatDecimal(payment.amount, 1, 2)}">0.00</td>
                <td><a class="row-action" th:href="@{/payments/{id}/receipt(id=${payment.id})}">Receipt</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="6" class="empty">No payments recorded.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<script>
    function confirmEntireStudentDeletion(form) {
        const studentName = form.dataset.studentName;
        const enteredName = window.prompt(
            'This permanently deletes ' + studentName
            + ' and ALL related book issues, payments, and receipts.\n\n'
            + 'Type the student name exactly to continue:'
        );
        return enteredName === studentName;
    }
</script>
</body>
</html>
