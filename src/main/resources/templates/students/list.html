<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Students</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <div class="page-header">
        <div>
            <h1>Students</h1>
            <p>Manage student/customer details used for book fee issues.</p>
        </div>
        <a class="button" th:href="@{/students/new}">Add Student</a>
    </div>
    <div class="alert success" th:if="${message}" th:text="${message}"></div>
    <form class="toolbar" th:action="@{/students}" method="get">
        <input type="search" name="search" placeholder="Search name or class" th:value="${search}">
        <button type="submit">Search</button>
    </form>
    <section class="panel">
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Contact</th>
                <th>Address</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.name}">Name</td>
                <td th:text="${student.grade}">Class</td>
                <td th:text="${student.contactNumber} ?: '-'">Contact</td>
                <td th:text="${student.address} ?: '-'">Address</td>
                <td><a th:href="@{/students/{id}(id=${student.id})}">Open</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="5" class="empty">No students found.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
