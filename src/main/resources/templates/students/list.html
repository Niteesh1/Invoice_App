<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Students</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <div class="page-header">
        <div>
            <h1>Students</h1>
            <p>Manage student/customer details used for book fee issues.</p>
        </div>
        <a class="button" th:href="@{/students/new}">Add Student</a>
    </div>
    <div class="alert success" th:if="${message}" th:text="${message}"></div>
    <form class="toolbar" th:action="@{/students}" method="get">
        <input type="search" name="search" placeholder="Search name or contact" th:value="${search}">
        <select name="grade">
            <option value="">All classes</option>
            <option th:each="className : ${classOptions}"
                    th:value="${className}"
                    th:selected="${className == selectedGrade}"
                    th:text="${className}">Class</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <section class="panel">
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Contact</th>
                <th>Address</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td><span class="student-name" th:text="${student.name}">Name</span></td>
                <td><span class="class-chip" th:text="${student.grade}">Class</span></td>
                <td><span class="muted-value" th:text="${student.contactNumber} ?: '-'">Contact</span></td>
                <td><span class="muted-value" th:text="${student.address} ?: '-'">Address</span></td>
                <td class="actions compact-actions">
                    <a class="row-action" th:href="@{/students/{id}(id=${student.id})}">Open</a>
                    <a class="row-action" th:href="@{/students/{id}/edit(id=${student.id})}">Edit</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="5" class="empty">No students found.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
